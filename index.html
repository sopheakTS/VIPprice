<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Noto Sans SC', sans-serif; }
        .category-item.active { background-color: #f97316; color: white; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden bg-gray-50">

    <header class="bg-white shadow-sm p-3 border-b flex flex-col gap-2">
        <h1 class="text-lg font-bold text-orange-600">Menu</h1>
        <input type="text" id="search-box" placeholder="ស្វែងរកឈ្មោះ ឬលេខកូដ..." 
               class="w-full p-2 border border-gray-200 rounded-lg text-xs focus:outline-none focus:ring-1 focus:ring-orange-400 bg-gray-50"
               oninput="handleSearch()">
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside id="category-bar" class="w-1/3 md:w-1/4 bg-white border-r overflow-y-auto p-2">
        </aside>

        <main id="app-container" class="flex-1 overflow-y-auto p-2 space-y-2">
        </main>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/1iXLoDPlNtwBr-jfIR8Nd73dxarb9kfv5o3r3MCRCqIo/gviz/tq?tqx=out:csv';
        let allData = [];
        let currentCategory = 'ទាំងអស់';

        async function fetchSheetData() {
            try {
                const response = await fetch(CSV_URL);
                const data = await response.text();
                const lines = data.split('\n');
                
                allData = lines.slice(1).map(line => {
                    const row = line.split(',').map(cell => cell.replace(/"/g, '').trim());
                    return { 
                        name: row[0] || '',
                        code: row[1] || '',
                        variant: row[2] || '',
                        salePrice: row[3] || '0',
                        vipPrice: row[4] || '0',
                        category: row[5] || 'ផ្សេងៗ',
                        inStock: row[6] !== '0'
                    };
                }).filter(i => i.name !== '');

                renderCategories();
                renderProducts('ទាំងអស់');
            } catch (e) {
                console.error(e);
            }
        }

        function renderCategories() {
            const categories = ['ទាំងអស់', ...new Set(allData.map(i => i.category))];
            document.getElementById('category-bar').innerHTML = categories.map(cat => `
                <button onclick="filter('${cat}', this)" class="category-item w-full text-left px-3 py-2 text-xs rounded-lg font-medium text-gray-700 mb-1 transition-all ${cat === 'ទាំងអស់' ? 'active' : ''}">
                    ${cat}
                </button>
            `).join('');
        }

        function filter(cat, btn) {
            currentCategory = cat;
            document.querySelectorAll('.category-item').forEach(el => el.classList.remove('active'));
            btn.classList.add('active');
            handleSearch();
        }

        function handleSearch() {
            const searchTerm = document.getElementById('search-box').value.toLowerCase();
            const filtered = allData.filter(item => {
                const matchesCategory = (currentCategory === 'ទាំងអស់' || item.category === currentCategory);
                const matchesSearch = (item.name.toLowerCase().includes(searchTerm) || item.code.toLowerCase().includes(searchTerm));
                return matchesCategory && matchesSearch;
            });
            renderProductList(filtered);
        }

        function renderProducts(cat) {
            currentCategory = cat;
            handleSearch();
        }

        function renderProductList(items) {
            const container = document.getElementById('app-container');
            container.innerHTML = items.map(item => `
                <div class="bg-white p-3 rounded-xl shadow-sm border border-gray-100 ${!item.inStock ? 'opacity-60 grayscale' : 'hover:border-orange-200'} transition-colors">
                    <div class="flex justify-between items-start mb-1">
                        <span class="font-bold text-gray-900 text-sm leading-snug">${item.name}</span>
                        <span class="text-[10px] text-gray-400 font-bold bg-gray-100 px-1.5 py-0.5 rounded">${item.code}</span>
                    </div>
                    
                    <div class="flex justify-between items-center mb-2">
                        <div class="text-[10px] text-orange-600 font-medium bg-orange-50 px-1.5 py-0.5 rounded inline-block">
                            ${item.variant}
                        </div>
                        ${!item.inStock ? '<span class="text-[9px] font-bold text-white bg-red-500 px-1.5 py-0.5 rounded-full">អស់ស្តុក</span>' : ''}
                    </div>

                    <div class="flex justify-between items-center border-t border-gray-100 pt-2">
                        <div class="flex items-center gap-1">
                            <span class="text-gray-500 text-[10px] font-semibold">លក់រាយ:</span>
                            <span class="text-orange-600 font-bold text-sm">${item.salePrice}</span>
                        </div>
                        <div class="flex items-center gap-1">
                            <span class="text-gray-400 text-[10px] font-bold">VIP:</span>
                            <span class="text-blue-600 font-bold text-sm">${item.vipPrice}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        window.onload = fetchSheetData;
    </script>
</body>
</html>
